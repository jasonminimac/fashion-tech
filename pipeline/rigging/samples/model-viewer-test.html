<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Tech — model-viewer Walk Cycle Test</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: #111;
      color: #eee;
    }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    p  { font-size: 0.85rem; color: #aaa; margin-bottom: 1.5rem; }
    model-viewer {
      width: 400px;
      height: 700px;
      background-color: #1e1e2e;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>Fashion Tech — Walk Cycle Test</h1>
  <p>Avatar generated by Sprint 1 rigging pipeline. Animation: "Walk".</p>

  <model-viewer
    src="../../../assets/meshes/avatar_walk.glb"
    autoplay
    animation-name="Walk"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    alt="Fashion Tech avatar with walk cycle animation">
  </model-viewer>

  <p style="margin-top:1rem">
    Serve this folder with: <code>npx serve .</code> — model-viewer requires HTTP/S.
  </p>
</body>
</html>
